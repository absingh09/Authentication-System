<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Inline theme script: runs before React to prevent flash of wrong theme -->
    <script>
      (function () {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A premium, production-ready SaaS authentication starter template featuring user registration, login, profile management, settings, JWT authentication, and refresh tokens." />
    <title>SaaS Auth System</title>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
