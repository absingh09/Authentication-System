<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
   <h1>Account Settings</h1>
    <p class="subtitle">Update your username or password</p>

    <div class="message" id="message"></div>

    <!-- Profile Picture Section -->
    <div style="text-align: center; margin-bottom: 24px;">
      <img id="currentAvatar" src="" alt="Profile"
           style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; display: none; margin: 0 auto 12px; border: 3px solid #4f46e5;" />
      <div id="currentAvatarLetter"
           style="width: 90px; height: 90px; border-radius: 50%; background: #4f46e5; color: white;
                  display: flex; align-items: center; justify-content: center; font-size: 32px;
                  font-weight: 700; margin: 0 auto 12px;">?</div>

      <input type="file" id="profilePicInput" accept=".jpg,.jpeg,.png,.gif" style="margin-bottom: 10px;" />
      <button class="btn btn-primary" id="uploadPicBtn" onclick="uploadProfilePic()">
        Upload Photo
      </button>
    </div>

    <hr style="margin-bottom: 24px; border: none; border-top: 1px solid #eee;" />

    <!-- Username Section -->
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="New username" />
    </div>

    <button class="btn btn-primary" id="updateUsernameBtn" onclick="updateUsername()">
      Update Username
    </button>

    <hr style="margin: 28px 0; border: none; border-top: 1px solid #eee;" />

    <!-- Password Section -->
    <div class="form-group">
      <label for="currentPassword">Current Password</label>
      <input type="password" id="currentPassword" placeholder="Enter current password" />
    </div>

    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" oninput="checkPasswordStrength()" />
      <div id="passwordHint" style="font-size: 12px; color: #888; margin-top: 6px;">
        Must be 8+ characters, with 1 uppercase letter & 1 number
      </div>
    </div>

    <button class="btn btn-primary" id="updatePasswordBtn" onclick="updatePassword()">
      Update Password
    </button>

    <div class="link-row">
      <a href="dashboard.html">← Back to Dashboard</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
