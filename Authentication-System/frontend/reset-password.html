<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below</p>

    <div class="message" id="message"></div>

    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" oninput="checkPasswordStrength()" />
      <div id="passwordHint" style="font-size: 12px; color: #888; margin-top: 6px;">
        Must be 8+ characters, with 1 uppercase letter & 1 number
      </div>
    </div>

    <button class="btn btn-primary" id="resetBtn" onclick="resetPassword()">
      Reset Password
    </button>

    <div class="link-row">
      <a href="index.html">Back to Login</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
