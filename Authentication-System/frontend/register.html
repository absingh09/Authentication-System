<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">Sign up to get started</p>

    <!-- This box shows success or error messages -->
    <div class="message" id="message"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" oninput="checkPasswordStrength()" />
      <div id="passwordHint" style="font-size: 12px; color: #888; margin-top: 6px;">
        Must be 8+ characters, with 1 uppercase letter & 1 number
      </div>
    </div>

    <button class="btn btn-primary" id="registerBtn" onclick="register()">
      Create Account
    </button>

    <div class="link-row">
      Already have an account? <a href="index.html">Login here</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
